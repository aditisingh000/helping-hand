name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build projects
      run: npm run build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          client/dist
          server/dist
        retention-days: 7

    - name: Notify Infrastructure Phase
      run: echo "Deployment process to be integrated once specific hosting (Vercel/AWS) is provisioned per PHASE_1_INFRASTRUCTURE.md"
