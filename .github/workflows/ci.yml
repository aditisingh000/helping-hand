name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - phase-1-infrastructure

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Test
        run: npm test --workspaces --if-present

